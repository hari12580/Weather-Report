<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<link rel="stylesheet" href="style.css">
<body>
    <div class="container">
            <div class="weather_container">

            <div class="temp">
                <p>20</p>
            </div>

            <div class="time_location">
        <p>Mumbai</p>
        <span>2025-02-27 Monday 12:58</span>
    </div>

            <div class="condition">
                <p></p>
                <p>Mist</p>
            </div>

        </div>
        <nav>
            <form>
                <input type="text" placeholder="Search for a Location" class="search_area" required>
                <button type="submit">Search Button</button>
            </form>
        </nav>
    </div>
</body>
<script src="script.js"></script>
</html>
